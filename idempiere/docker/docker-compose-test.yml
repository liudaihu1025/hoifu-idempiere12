# docker-compose-test.yml
version: '3.8'

services:
  postgresql:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - idempiere-test-network
    restart: unless-stopped

  idempiere:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      IDEMPIERE_HOME: /opt/idempiere_docker
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      - postgresql
    volumes:
      - idempiere_data_test:/opt/idempiere_docker/data
      - idempiere_logs_test:/opt/idempiere_docker/logs
    networks:
      - idempiere-test-network
    restart: unless-stopped

volumes:
  postgres_data_test:
  idempiere_data_test:
  idempiere_logs_test:

networks:
  idempiere-test-network:
    driver: bridge